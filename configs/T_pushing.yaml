settings:
  seed: 0
  task_name: "T_pushing"
  data_mode: "ct_ctl" # {"dt_dyn","ct_dyn", "ct_ctl"}
  train_mode: "ct_ctl" # {"dt_dyn","ct_dyn", "ct_ctl"}

data:
  state_dim: 8
  pose_dim: 3
  action_dim: 2
  action_bound: 30
  stem_size: [30, 90] # [10,60]
  bar_size: [120, 30] # [60,10]
  pusher_size: 5
  dt_dyn:
    out_path: "output/data/${settings.task_name}_freq${data.dt_dyn.frequency}"
    num_episodes: 16000
    episode_length: 50
    num_workers: 48
    frequency: 1 # DT dynamics frequency
  ct_dyn:
    out_path: "output/data/${settings.task_name}_freq${data.ct_dyn.frequency}"
    num_episodes: 16000
    episode_length: 50
    num_workers: 48
    frequency: 10 # CT dynamics frequency
  ct_ctl:
    out_path: "output/data/${settings.task_name}_freq${data.ct_ctl.frequency}_ctl"
    model_dir: "output/runs/${settings.task_name}_ct_dyn/log_20_lr0.0025_bs128_20260103_001438"
    num_episodes: 16000
    episode_length: 30
    num_workers: 48
    frequency: 10 # CT control frequency
  training: True
  saving: True
  visualizing: False
  gif: False
  scale: 100 # normalize the data, (x,y)/scale
  window_size: 500
  enlarge_factor_for_gen: 4

train_dt_dyn:
  out_dir: "output/runs/${settings.task_name}"
  data_dir: "output/data/${settings.task_name}_freq1"
  data_augment: False
  pred_mode: "pose" # {"state","pose"}
  train_valid_ratio: 0.9
  architecture: [96, 96, 96]
  delta_u: True
  n_history: 1
  n_rollout_valid: 6
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 6
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.001
    lr_final: 0.0001
  n_epoch: 25
  reach:
    mode: "none" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    eps_init: 0.08
    eps_final: 0.05
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.002
    # batch_size: 8
  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_reach_pose2"
    run_name: "${train_dt_dyn.horizon_scheduler.type}_${train_dt_dyn.lr_scheduler.type}_${train_dt_dyn.batch_size}_${train_dt_dyn.reach.mode}_${train_dt_dyn.reach.every}_${train_dt_dyn.reach.after}_eps${train_dt_dyn.reach.eps_init}_${train_dt_dyn.reach.eps_final}_w${train_dt_dyn.reach.weight}_j${train_dt_dyn.lam_jac_reg}_${train_dt_dyn.delta_u}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

train_ct_dyn:
  out_dir: "output/runs/${settings.task_name}_${settings.train_mode}"
  data_dir: "output/data/${settings.task_name}_freq${train_ct_dyn.frequency}"
  data_augment: False
  pred_mode: "pose" # {"state","pose"}
  train_valid_ratio: 0.9
  architecture: [64, 64]
  frequency: 10
  ode_step_size_controller: "pid" # {"const","pid"}
  delta_u: True
  n_history: 1
  n_rollout_valid: 20
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 20
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.0025
    lr_final: 0.0001
  n_epoch: 8
  reach:
    mode: "none" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    eps_init: 0.08
    eps_final: 0.05
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.002
    # batch_size: 8
  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_ct_test"
    run_name: "${train_ct_dyn.horizon_scheduler.type}_${train_ct_dyn.horizon_scheduler.T_final}_lr${train_ct_dyn.lr_scheduler.lr_init}_bs${train_ct_dyn.batch_size}_${train_ct_dyn.ode_step_size_controller}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

train_ct_ctl:
  out_dir: "output/runs/${settings.task_name}_ct_ctl"
  data_dir: "output/data/${settings.task_name}_freq${train_ct_ctl.ctl_frequency}_ctl"
  data_augment: False
  pred_mode: "pose" # {"state","pose"}
  train_valid_ratio: 0.9
  architecture: [64, 64]
  ctl_frequency: 10
  target_frequency: 1
  ref_action: False
  n_history: 1
  n_rollout_valid: 10
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 10
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.001
    lr_final: 0.0001
  n_epoch: 8
  reach:
    mode: "none" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    eps_init: 0.08
    eps_final: 0.05
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.002
    # batch_size: 8
  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_reach_ct_ctl_test"
    run_name: "${train_ct_ctl.horizon_scheduler.type}_${train_ct_ctl.horizon_scheduler.T_final}_lr${train_ct_ctl.lr_scheduler.lr_init}_x"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

planning:
  out_path: "output/planning/${settings.task_name}"
  horizon: 15
  max_steps: 20
  n_act_step: 6
  num_test: 1
  action_bound: 30
  cost_norm: 1
  only_final_cost: False
  n_sample: 640
  n_update_iter: 20
  
  use_last: False
  reject_bad: True
  mppi:
    reward_weight: 1.0
    noise_level: 0.05
    # noise_decay: 0.95
    # beta_filter: 0.7
  cem:
    elite_ratio: 0.05
    min_n_elites: 10
    cov_jitter: 1e-6