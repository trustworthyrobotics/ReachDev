settings:
  seed: 0
  task_name: "T_pushing"

data:
  out_path: "output/data/${settings.task_name}"
  state_dim: 8
  action_dim: 2
  action_bound: 30
  stem_size: [30, 90] # [10,60]
  bar_size: [120, 30] # [60,10]
  pusher_size: 5
  num_episodes: 32000
  num_workers: 48 # 48
  episode_length: 30
  training: True
  saving: True
  visualizing: False
  gif: False
  scale: 100 # normalize the data, (x,y)/scale
  window_size: 500
  augment: False

train:
  out_dir: "output/runs/${settings.task_name}"
  train_valid_ratio: 0.9
  activation: "relu"
  architecture: [96, 96, 96]
  # architecture: [128, 128, 128]
  n_history: 1
  n_rollout: 3
  n_rollout_valid: 6
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr: 0.001
  lr_params:
    adam_beta1: 0.9
  lr_scheduler:
    type: "CosineAnnealingLR"
    enabled: True
  n_epoch: 100
  reach:
    mode: "after" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.8 # only for "after" mode, after N*n_epoch epochs
    eps_min: 0.0001
    eps_max: 0.001
    splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.0001
    batch_size: 8
  batch_size: 512
  lam_l1_reg: 0 # 2.0e-4 # l1 regularization
  wandb:
    enabled: true
    project: "${settings.task_name}_reach"
    run_name: "{train.reach.mode}_{train.reach.every}_${train.reach.after}_eps${train.reach.eps_min}_${train.reach.eps_max}_w${train.reach.weight}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  
planning:
  out_path: "output/planning/${settings.task_name}"
  horizon: 15
  max_steps: 20
  n_act_step: 6
  num_test: 1
  action_bound: 30
  cost_norm: 1
  only_final_cost: False
  n_sample: 640
  n_update_iter: 20
  
  use_last: False
  reject_bad: True
  mppi:
    reward_weight: 1.0
    noise_level: 0.05
    # noise_decay: 0.95
    # beta_filter: 0.7
  cem:
    elite_ratio: 0.05
    min_n_elites: 10
    cov_jitter: 1e-6