settings:
  seed: 0
  task_name: "T_pushing_test"

data:
  out_path: "output/data/${settings.task_name}"
  state_dim: 8
  action_dim: 2
  action_bound: 30
  stem_size: [30, 90] # [10,60]
  bar_size: [120, 30] # [60,10]
  pusher_size: 5
  num_episodes: 10
  num_workers: 1 # 48
  episode_length: 30
  training: True
  saving: True
  visualizing: False
  gif: False
  scale: 100 # normalize the data, (x,y)/scale
  window_size: 500
  augment: False

train:
  out_dir: "output/runs/${settings.task_name}"
  train_valid_ratio: 0.9
  activation: "relu"
  architecture: [64, 64]
  n_history: 1
  n_rollout: 2
  n_rollout_valid: 6
  step_weight_ub: 2
  noise: 0.001 # std of the Gaussian noise to training data
  lr: 0.01
  lr_params:
    adam_beta1: 0.9
  lr_scheduler:
    type: "CosineAnnealingLR"
    enabled: true
  n_epoch: 100
  reach_every: 1
  batch_size: 16
  lam_l1_reg: 0.0e-8 # 2.0e-4 # l1 regularization
  wandb:
    enabled: false
    project: "${settings.task_name}"
    run_name: "${train.architecture}_ep${train.n_epoch}_bs${train.batch_size}_lr${train.lr}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 20                # log every N training iterations
    save_checkpoints: false       # save model checkpoints to wandb  