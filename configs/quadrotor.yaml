settings:
  seed: 0
  task_name: "quadrotor"
  data_mode: "dt_dyn" # {"dt_dyn", "ct_ctl"}
  train_mode: "ct_ctl" # {"dt_dyn", "ct_ctl"}
  device: "gpu" # {"cpu", "gpu"}

data:
  ct_state_dim: 12 # position + orientation + roll, pitch, yaw + roll, pitch, yaw rates
  ct_action_dim: 3 # 3 or 4 (thrust + torques w/ or w/o yaw control)
  ct_frequency: 100  # CT simulation frequency
  ode_step_size_controller: 'pid'

  action_bounds: [[-15.0, -1.0, -1.0], [15.0, 1.0, 1.0]] # min and max action limits
  # action_bounds: [[-15.0, -1.0, -1.0, -0.5], [15.0, 1.0, 1.0, 0.5]] # min and max action limits for 4D action

  dt_state_dim: 6 # position + velocity
  dt_action_dim: 3 # velocity commands
  dt_frequency: 5  # DT simulation frequency

  ctl_frequency: 20  # CT controller frequency
  pid_gains:
    kp_vel:  [3, 3, 10.0]
    kp_att:  [10, 10, 5]
    kp_rate: [1.0, 1.0, 0.8]
  g: 9.81
  m: 1.4
  J_x: 0.054
  J_y: 0.054
  J_z: 0.104
  tau_phi: 0.0
  acc_limits: 1.0  # max acceleration for generating velocity commands
  vel_limits: 2.0  # max velocity for generating velocity commands
  init_noise: 1

  dt_dyn:
    out_path: "output/data/${settings.task_name}_freq${data.dt_dyn.frequency}"
    ct_ctl: "pid" # "pid" or path to NN controller model
    num_episodes: 25600
    episode_length: 20
    batch_size: 1024
    frequency: ${data.dt_frequency} # DT dynamics frequency
  ct_ctl:
    out_path: "output/data/${settings.task_name}_freq${data.ct_ctl.frequency}_ctl_x1"
    num_episodes: 10240 # 51200
    episode_length: 25
    batch_size: 512
    frequency: ${data.ctl_frequency} # CT with controller frequency
  training: True
  saving: True
  gif: false
  scale: 1 # normalize the data

train_dt_dyn:
  out_dir: "output/runs/${settings.task_name}_dt_dyn"
  data_dir: ${data.dt_dyn.out_path}
  standardize: False
  train_valid_ratio: 0.9
  architecture: [64, 64]
  n_history: 1
  n_rollout_valid: 20
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 20
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.001
    lr_final: 0.0001
  n_epoch: 20
  reach:
    mode: "mid" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    eps_init: 0.2
    eps_final: 0.1
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.0015
    # batch_size: 8
  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_dt_dyn"
    run_name: "${train_dt_dyn.horizon_scheduler.type}_${train_dt_dyn.lr_scheduler.type}_${train_dt_dyn.batch_size}_${train_dt_dyn.standardize}_${train_dt_dyn.reach.mode}_eps${train_dt_dyn.reach.eps_init}_${train_dt_dyn.reach.eps_final}_w${train_dt_dyn.reach.weight}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

train_ct_ctl:
  out_dir: "output/runs/${settings.task_name}_ct_ctl"
  data_dir: ${data.ct_ctl.out_path}
  activation: "relu" # {"relu", "tanh"}
  standardize: False
  enforce_action_bounds: False
  scale_actions: False
  train_valid_ratio: 0.9
  architecture: [64, 64]
  ctl_frequency: ${data.ct_ctl.frequency}
  target_frequency: 1
  loss_mode: "su"
  n_history: 1
  n_rollout_valid: 10
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 10
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.001
    lr_final: 0.0001
  n_epoch: 4
  reach:
    mode: "mid" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    linear: True
    eps_init: 0.03
    eps_final: 0.02
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.0006
    # batch_size: 8
    # below for CT reachability settings
    init_remainder: ${reachability.init_remainder}
    frr_rounds: ${reachability.frr_rounds}
    frr_stop_ratio: ${reachability.frr_stop_ratio}
    sr_window_size: ${reachability.sr_window_size}

  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_ct_ctl_7"
    run_name: "${train_ct_ctl.activation}_${train_ct_ctl.architecture}_${train_ct_ctl.horizon_scheduler.type}_${train_ct_ctl.horizon_scheduler.T_final}_lr${train_ct_ctl.lr_scheduler.lr_init}_${train_ct_ctl.loss_mode}_${train_ct_ctl.standardize}_${train_ct_ctl.enforce_action_bounds}_${train_ct_ctl.scale_actions}_${train_ct_ctl.reach.mode}_${train_ct_ctl.reach.eps_init}_${train_ct_ctl.reach.eps_final}_${train_ct_ctl.reach.weight}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

reachability:
  eps: 0.3
  init_splits: {}
  refine_splits: {}
  # below for CT reachability settings
  init_remainder: 5e-2
  frr_rounds: 1
  frr_stop_ratio: 0.95
  sr_window_size: 100

testing:
  mode: "certified" # {"certified","regular"}
  # certified test models
  certified:
    dt_dyn_dir: "${train_dt_dyn.out_dir}/log_cos_128_False_mid_eps0.5_0.3_w0.0015_20260128_080733"
    ct_ctl_dir: "${train_ct_ctl.out_dir}/relu_[64,_64]_log_10_lr0.001_su_False_False_False_mid_0.02_0.01_0.0008_20260128_131552"

  # regular test models
  regular:
    dt_dyn_dir: "${train_dt_dyn.out_dir}/log_cos_128_False_none_eps0.2_0.1_w0.0015_20260128_082835"
    ct_ctl_dir: "${train_ct_ctl.out_dir}/relu_[64,_64]_log_10_lr0.001_su_False_False_False_none_0.03_0.02_0.0006_20260128_083615"

planning:
  out_path: "output/rss/planning/${settings.task_name}/${planning.test_id}_${planning.disturbance.type}_${planning.disturbance.init}_${planning.disturbance.inter}_${planning.planner}_${planning.n_sample}"
  add_timestamp: true
  horizon: 10
  max_steps: 100
  n_act_step: 5
  num_test: 20
  test_id: 0
  action_dim: ${data.dt_action_dim}
  action_bound: 1
  verbose: False

  disturbance:
    type: "uniform" # {"none","normal","uniform"}
    # init: 0.05
    init: 0.3
    inter: 0.01
    per_act: false # whether to add disturbance per action step (true) or per control step (false)

  obstacle:
    enable: true
    pos_list: [[5.0, 5.0, 5.0]]
    size_list: [2.0]
    inflate: 0.2
    norm: 2
    penalty: 100.0
    enforce_reach_steps: 10

  enable_ctl: true
  use_pid: false
  reach_in_obj:
    enable: true
    weight: 0.3
    loss_max: 10
    clip: true
    eps: ${planning.disturbance.init}
    collision_penalty: 1.0
  refinement:
    enable: true
    lr: 0.01
    n_iter: 5
    reach_in_obj:
      enable: true
      weight: 0.3
      loss_max: 10
      clip: false
      collision_penalty: 100

  cost_norm: 1
  only_final_cost: False
  n_sample: 1000
  n_update_iter: 10
  
  planner: "mppi" # {"mppi","cem"}
  use_last: False
  reject_bad: True
  mppi:
    reward_weight: 50
    noise_level: 0.2
    # noise_decay: 0.95
    # beta_filter: 0.7
  cem:
    elite_ratio: 0.05
    min_n_elites: 10
    cov_jitter: 1e-2
