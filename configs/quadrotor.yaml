settings:
  seed: 0
  task_name: "quadrotor"
  data_mode: "dt_dyn" # {"dt_dyn", "ct_ctl"}
  train_mode: "dt_dyn" # {"dt_dyn", "ct_ctl"}

data:
  ct_state_dim: 12 # position + orientation + roll, pitch, yaw + roll, pitch, yaw rates
  ct_action_dim: 3 # 3 or 4 (thrust + torques w/ or w/o yaw control)
  ct_frequency: 100  # CT simulation frequency
  ode_step_size_controller: 'pid'

  action_bounds: [[-15.0, -1.0, -1.0], [15.0, 1.0, 1.0]] # min and max action limits
  # action_bounds: [[-15.0, -1.0, -1.0, -0.5], [15.0, 1.0, 1.0, 0.5]] # min and max action limits for 4D action

  dt_state_dim: 6 # position + velocity
  dt_action_dim: 3 # velocity commands
  dt_frequency: 5  # DT simulation frequency

  ctl_frequency: 20  # CT controller frequency
  pid_gains:
    kp_vel:  [3, 3, 10.0]
    kp_att:  [10, 10, 5]
    kp_rate: [1.0, 1.0, 0.8]
  g: 9.81
  m: 1.4
  J_x: 0.054
  J_y: 0.054
  J_z: 0.104
  tau_phi: 0.0
  acc_limits: 1.0  # max acceleration for generating velocity commands
  vel_limits: 5.0  # max velocity for generating velocity commands

  dt_dyn:
    out_path: "output/data/${settings.task_name}_freq${data.dt_dyn.frequency}"
    ct_ctl: "pid" # "pid" or path to NN controller model
    num_episodes: 25600
    episode_length: 20
    batch_size: 1024
    frequency: ${data.dt_frequency} # DT dynamics frequency
  ct_ctl:
    out_path: "output/data/${settings.task_name}_freq${data.ct_ctl.frequency}_ctl"
    num_episodes: 51200
    episode_length: 5
    batch_size: 512
    frequency: ${data.ctl_frequency} # CT with controller frequency
  training: True
  saving: True
  gif: false
  scale: 1 # normalize the data

train_dt_dyn:
  out_dir: "output/runs/${settings.task_name}_dt_dyn"
  data_dir: ${data.dt_dyn.out_path}
  standardize: False
  train_valid_ratio: 0.9
  architecture: [64, 64]
  n_history: 1
  n_rollout_valid: 20
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 20
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.001
    lr_final: 0.0001
  n_epoch: 20
  reach:
    mode: "none" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    eps_init: 0.08
    eps_final: 0.05
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.0015
    # batch_size: 8
  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_dt_dyn"
    run_name: "${train_dt_dyn.horizon_scheduler.type}_${train_dt_dyn.lr_scheduler.type}_${train_dt_dyn.batch_size}_${train_dt_dyn.standardize}_${train_dt_dyn.reach.mode}_eps${train_dt_dyn.reach.eps_init}_${train_dt_dyn.reach.eps_final}_w${train_dt_dyn.reach.weight}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

train_ct_ctl:
  out_dir: "output/runs/${settings.task_name}_ct_ctl"
  data_dir: ${data.ct_ctl.out_path}
  standardize: False
  train_valid_ratio: 0.9
  architecture: [64, 64, 64]
  ctl_frequency: ${data.ct_ctl.frequency}
  target_frequency: 1
  loss_mode: "stu"
  n_history: 1
  n_rollout_valid: 10
  horizon_scheduler:
    type: "log" # log, linear, const
    T_init: 1
    T_final: 10
    log_alpha: 1.0
  step_weight_ub: 2
  noise: 0.005 # std of the Gaussian noise to training data
  lr_scheduler:
    type: "cos" # cos, linear, const
    lr_init: 0.001
    lr_final: 0.0001
  n_epoch: 10
  reach:
    mode: "none" # {"none","mid","after"}
    every: 1 # only for "mid" and "after" mode, every N batches
    after: 0.6 # only for "after" mode, after N*n_epoch epochs
    eps_init: 0.08
    eps_final: 0.05
    # splits: {0: 2, 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2}
    weight: 0.001
    # batch_size: 8
    # below for CT reachability settings
    init_remainder: ${reachability.init_remainder}
    frr_rounds: ${reachability.frr_rounds}
    frr_stop_ratio: ${reachability.frr_stop_ratio}
    sr_window_size: ${reachability.sr_window_size}

  batch_size: 128
  lam_jac_reg: 0.0e-3 # jacobian regularization weight
  wandb:
    enabled: true
    project: "${settings.task_name}_ct_ctl"
    run_name: "${train_ct_ctl.horizon_scheduler.type}_${train_ct_ctl.horizon_scheduler.T_final}_lr${train_ct_ctl.lr_scheduler.lr_init}_${train_ct_ctl.loss_mode}_${train_ct_ctl.standardize}_${train_ct_ctl.reach.mode}_${train_ct_ctl.reach.eps_init}_${train_ct_ctl.reach.eps_final}_${train_ct_ctl.reach.weight}"
    mode: "online"               # {"online","offline","disabled"}
    log_every: 50                # log every N training iterations
    save_checkpoints: true       # save model checkpoints to wandb  

reachability:
  eps: 0.05
  init_splits: {}
  refine_splits: {0: 2, 1: 2, 2: 2}
  # below for CT reachability settings
  init_remainder: 5e-2
  frr_rounds: 3
  frr_stop_ratio: 0.95
  sr_window_size: 100

test_models:
  dt_dyn_dir: "${train_dt_dyn.out_dir}/nt_log_cos_128_False_none_eps0.08_0.05_w0.0015_20260114_011954"
  ct_ctl_dir: "${train_ct_ctl.out_dir}/log_10_lr0.001_stu_False_none_0.08_0.05_0.001_20260114_011947"
